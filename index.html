<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavy Chain IK · Matter.js</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a0f08'/%3E%3Cpath d='M16 4 L16 28 M10 8 L22 8 M10 14 L22 14 M10 20 L22 20 M10 26 L22 26' stroke='%238b4513' stroke-width='2.5' fill='none'/%3E%3C/svg%3E">
<style>
  :root {
    --rust: #8b4513;
    --rust-dark: #3d1d0b;
    --rust-deep: #1a0a02;
    --wood: #a87844;
    --wood-dark: #5a3920;
    --bg-dark: #1a0f08;
    --bg-light: #3d2817;
    --bg-mid: #2b1d12;
    --hud: rgba(255, 220, 180, 0.55);
    --hud-bg: rgba(20, 12, 6, 0.65);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, var(--bg-light) 0%, var(--bg-mid) 45%, var(--bg-dark) 100%);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Apple SD Gothic Neo", "Noto Sans KR", "Nanum Gothic Coding", monospace;
    color: var(--hud);
    cursor: grab;
    -webkit-font-smoothing: antialiased;
  }
  body.grabbing { cursor: grabbing; }
  body.over-link { cursor: grab; }
  #stage { position: fixed; inset: 0; }
  #stage canvas { display: block; }
  #hud {
    position: fixed;
    left: 18px; bottom: 18px;
    padding: 10px 14px;
    background: var(--hud-bg);
    border: 1px solid rgba(255, 220, 180, 0.12);
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 0.06em;
    line-height: 1.7;
    pointer-events: none;
    user-select: none;
    backdrop-filter: blur(2px);
  }
  #hud .key {
    display: inline-block;
    min-width: 18px;
    padding: 1px 6px;
    margin-right: 6px;
    background: rgba(255, 220, 180, 0.1);
    border: 1px solid rgba(255, 220, 180, 0.22);
    border-radius: 3px;
    color: rgba(255, 220, 180, 0.85);
    text-align: center;
    font-size: 10px;
  }
  #audio-status {
    margin-top: 4px;
    opacity: 0.7;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  #audio-status:hover { opacity: 1; }
  .lang-row { display: flex; align-items: center; }
  .lang-row .key { cursor: pointer; user-select: none; }
  .lang-row .key:hover { background: rgba(255, 220, 180, 0.2); }
  #title {
    position: fixed;
    top: 16px; left: 18px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 220, 180, 0.45);
    pointer-events: none;
    user-select: none;
  }
  #title b {
    color: rgba(255, 220, 180, 0.85);
    font-weight: 600;
  }
  #ts { display: none; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="title" data-i18n-html="title"><b>헤비 체인 IK</b> · matter.js</div>
<div id="hud">
  <div><span class="key">drag</span><span data-i18n="hud.drag">링크를 잡고 흔들기</span></div>
  <div><span class="key">R</span><span data-i18n="hud.reset">리셋</span></div>
  <div><span class="key">space</span><span data-i18n="hud.impulse">볼에 임펄스</span></div>
  <div class="lang-row"><span class="key" id="lang-key" title="click or press L">L</span><span data-i18n="hud.lang">한/영 전환</span></div>
  <div id="audio-status" data-i18n-title="hud.sound.title" data-i18n="hud.sound.on" title="클릭하여 사운드 토글">사운드: 켜짐</div>
</div>
<div id="ts">0</div>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
(() => {
  'use strict';

  // Matter.js modules
  const { Engine, Render, Runner, Composite, Bodies, Body, Constraint,
          MouseConstraint, Mouse, Events } = Matter;

  // Viewport helpers
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // Engine + tuning (per README "Design Choices" — heavy + damped)
  const engine = Engine.create({
    positionIterations: 8,
    velocityIterations: 6
  });
  engine.gravity.y = 1; // default

  // Renderer
  const render = Render.create({
    element: document.getElementById('stage'),
    engine,
    options: {
      width: W(),
      height: H(),
      wireframes: false,
      background: 'transparent',
      pixelRatio: window.devicePixelRatio || 1
    }
  });
  Render.run(render);
  Runner.run(Runner.create(), engine);

  // Resize: keep canvas full-viewport, Render follows
  window.addEventListener('resize', () => {
    render.canvas.width = W();
    render.canvas.height = H();
    render.options.width = W();
    render.options.height = H();
  });

  // ───────────────────────── Named composites ─────────────────────────
  const stageComp = Composite.create({ label: 'stage' });
  const chainComp = Composite.create({ label: 'chain' });
  const boxComp   = Composite.create({ label: 'boxes' });

  // ───────────────────────── Constants ─────────────────────────
  const N_LINKS    = 24;        // chain length (links)
  const LINK_W     = 22;        // link width
  const LINK_H     = 20;        // link height (along chain direction)
  const LINK_GAP   = -3;        // small visual overlap so links read as continuous chain
  const ANCHOR_Y   = 50;        // top of first link (just below the cleat)
  const BALL_R     = 26;        // wrecking ball radius
  const BALL_DENS  = 0.3;       // wrecking ball density (much heavier than chain)

  // ───────────────────────── Static stage ─────────────────────────
  function buildStage() {
    Composite.clear(stageComp, false, true);
    const wallOpts = {
      isStatic: true,
      label: 'stage',
      render: { fillStyle: '#241710', strokeStyle: '#0e0805', lineWidth: 1 }
    };
    const cleatOpts = {
      isStatic: true,
      label: 'stage',
      render: { fillStyle: '#5a2e0d', strokeStyle: '#1a0a02', lineWidth: 2 }
    };
    const ceilingOpts = {
      isStatic: true,
      label: 'stage',
      render: { fillStyle: '#150b06' }
    };

    Composite.add(stageComp, [
      // Floor (extra wide to avoid gaps on resize)
      Bodies.rectangle(W() / 2, H() - 20, W() * 2.5, 40, wallOpts),
      // Left wall
      Bodies.rectangle(-20, H() / 2, 40, H() * 2.5, wallOpts),
      // Right wall
      Bodies.rectangle(W() + 20, H() / 2, 40, H() * 2.5, wallOpts),
      // Visible cleat (the rust bolt the chain hangs from)
      Bodies.rectangle(W() / 2, 28, 180, 18, cleatOpts),
      // Two mounting bolts for cleat detail
      Bodies.circle(W() / 2 - 70, 28, 5, Object.assign({}, cleatOpts, { render: { fillStyle: '#2a1408' } })),
      Bodies.circle(W() / 2 + 70, 28, 5, Object.assign({}, cleatOpts, { render: { fillStyle: '#2a1408' } })),
    ]);
    Composite.add(engine.world, stageComp);
  }

  // ───────────────────────── Chain ─────────────────────────
  function buildChain() {
    Composite.clear(chainComp, false, true);

    // Uniform links, stacked edge-to-edge with a small visual overlap so they
    // read as a continuous chain segment rather than a ladder.
    // Alternating dark/light tones + thicker dark stroke simulates rusty
    // "iron band" rings without needing compound bodies.
    // Collision filter: chain does NOT self-collide but DOES collide with boxes.
    const baseLink = {
      density: 0.05,        // per README: heavy
      friction: 0.9,        // per README: rusty
      frictionAir: 0.01,    // per README: damped "heavy" feel
      restitution: 0.1,
      collisionFilter: {
        category: 0x0002,
        mask: 0xFFFD        // collide with everything EXCEPT other chain links (0x0002)
      }
    };

    const links = [];
    let y = ANCHOR_Y;
    const anchorX = W() / 2;

    for (let i = 0; i < N_LINKS; i++) {
      const odd = (i % 2 === 1);
      const opts = Object.assign({}, baseLink, {
        label: 'chain-link',
        render: {
          fillStyle:   odd ? '#5a2a0c' : '#a05818',
          strokeStyle: '#1a0902',
          lineWidth: 2.5
        }
      });
      // Small horizontal jitter for "ironwork" feel
      const jx = ((i * 41) % 5) - 2; // -2..+2 px
      const link = Bodies.rectangle(anchorX + jx, y + LINK_H / 2, LINK_W, LINK_H, opts);
      links.push(link);
      y += LINK_H + LINK_GAP;
    }

    // Wrecking ball — heavy iron weight hanging from the last link
    // Collision filter: collides with boxes/stage (0x0001) but NOT with chain links (0x0002)
    const ball = Bodies.circle(
      anchorX,
      y + BALL_R,
      BALL_R,
      {
        label: 'wrecking-ball',
        density: BALL_DENS,
        friction: 0.6,
        frictionAir: 0.005,    // ball flies far, only minor air drag
        restitution: 0.08,
        collisionFilter: { category: 0x0001, mask: 0xFFFD }, // exclude 0x0002 (chain)
        render: {
          fillStyle: '#3a2818',
          strokeStyle: '#0d0703',
          lineWidth: 3
        }
      }
    );

    // Constraints
    const constraints = [];

    // Anchor: mount to a fixed point above the first link's top edge
    constraints.push(Constraint.create({
      pointA: { x: anchorX, y: ANCHOR_Y },
      bodyB: links[0],
      pointB: { x: 0, y: -LINK_H / 2 },
      length: 0,
      stiffness: 1,        // rigid mount
      damping: 0.3,
      render: { visible: false }
    }));

    // Inter-link: bottom of i ↔ top of i+1, with overlap so links visually fuse
    const halfStep = (LINK_H + LINK_GAP) / 2;
    for (let i = 0; i < links.length - 1; i++) {
      constraints.push(Constraint.create({
        bodyA: links[i],
        pointA: { x: 0, y: halfStep },
        bodyB: links[i + 1],
        pointB: { x: 0, y: -halfStep },
        length: 0,
        stiffness: 0.7,    // flexible enough for visible IK sag
        damping:   0.15,   // damped but not floppy
        render: { visible: false }
      }));
    }

    // Wrecking ball hanging from the last link
    constraints.push(Constraint.create({
      bodyA: links[links.length - 1],
      pointA: { x: 0, y: LINK_H / 2 },
      bodyB: ball,
      pointB: { x: 0, y: -BALL_R },
      length: 0,
      stiffness: 0.85,
      damping: 0.18,
      render: { visible: false }
    }));

    Composite.add(chainComp, [...links, ball, ...constraints]);
    Composite.add(engine.world, chainComp);
    return { links, ball, end: ball };
  }

  // ───────────────────────── Wooden boxes (pyramid 3-2-1) ─────────────────────────
  function buildBoxes() {
    Composite.clear(boxComp, false, true);
    const woodOpts = {
      label: 'wood-box',
      density: 0.002,
      friction: 0.85,
      frictionStatic: 1.0,
      frictionAir: 0.012,
      restitution: 0.1,
      render: { fillStyle: '#a87844', strokeStyle: '#5a3920', lineWidth: 2 }
    };
    const woodPlankOpts = Object.assign({}, woodOpts, {
      render: { fillStyle: '#b8854f', strokeStyle: '#5a3920', lineWidth: 2 }
    });

    const cx = W() / 2 + 150;  // chain swings right to hit this stack
    const groundY = H() - 40;  // top of floor body

    const boxes = [];

    // Row 0 — three large boxes on the floor
    const r0Y = groundY - 20;
    const r0W = [120, 120, 120];
    let x = cx - (r0W[0] + r0W[1] + r0W[2]) / 2 - 10;
    for (let i = 0; i < 3; i++) {
      boxes.push(Bodies.rectangle(x + r0W[i] / 2, r0Y, r0W[i], 40, woodOpts));
      x += r0W[i] + 10;
    }

    // Row 1 — two medium boxes
    const r1Y = r0Y - 40 - 2;
    const r1W = [90, 90];
    x = cx - r1W[0] / 2 - 5;
    for (let i = 0; i < 2; i++) {
      boxes.push(Bodies.rectangle(x + r1W[i] / 2, r1Y, r1W[i], 40, woodPlankOpts));
      x += r1W[i] + 10;
    }

    // Row 2 — one small box on top
    const r2Y = r1Y - 40 - 2;
    boxes.push(Bodies.rectangle(cx, r2Y, 70, 40, woodPlankOpts));

    Composite.add(boxComp, boxes);
    Composite.add(engine.world, boxComp);
    return boxes;
  }

  // ───────────────────────── Mouse interaction ─────────────────────────
  const mouse = Mouse.create(render.canvas);
  // Make mouse pixel-ratio aware (canvas may be scaled)
  mouse.pixelRatio = window.devicePixelRatio || 1;

  const mouseConstraint = MouseConstraint.create(engine, {
    mouse,
    constraint: {
      stiffness: 0.12,   // moderate — chain follows cursor but with believable lag
      damping: 0.12,
      render: { visible: false }
    }
  });
  Composite.add(engine.world, mouseConstraint);

  // Cursor feedback
  Events.on(mouseConstraint, 'startdrag', () => document.body.classList.add('grabbing'));
  Events.on(mouseConstraint, 'enddrag',   () => document.body.classList.remove('grabbing'));

  // ───────────────────────── i18n (Korean default + English) ─────────────────────────
  // All visible UI text lives here. Use data-i18n="key" on any text node to wire it.
  // data-i18n-html="key" for content with inline tags.
  // data-i18n-title="key" for the `title` attribute.
  // Default = Korean per request. Persists user choice in localStorage.
  const i18n = {
    ko: {
      'title':            '<b>헤비 체인 IK</b>',
      'hud.drag':         '링크를 잡고 흔들기',
      'hud.reset':        '리셋',
      'hud.impulse':      '볼에 임펄스',
      'hud.lang':         '한/영 전환',
      'hud.sound.on':     '사운드: 켜짐',
      'hud.sound.off':    '사운드: 꺼짐',
      'hud.sound.title':  '클릭하여 사운드 토글'
    },
    en: {
      'title':            '<b>Heavy Chain IK</b>',
      'hud.drag':         'grab any link & swing',
      'hud.reset':        'reset scene',
      'hud.impulse':      'impulse on ball',
      'hud.lang':         '한/영 toggle',
      'hud.sound.on':     'sound: on',
      'hud.sound.off':    'sound: off',
      'hud.sound.title':  'click to toggle sound'
    }
  };

  const LANG_KEY = 'heavy-chain-ik.lang';
  let currentLang = (() => {
    try {
      const saved = localStorage.getItem(LANG_KEY);
      if (saved === 'ko' || saved === 'en') return saved;
    } catch (_) {}
    return 'ko';   // default per user request
  })();

  function t(key) {
    return (i18n[currentLang] && i18n[currentLang][key]) || i18n.ko[key] || key;
  }

  function applyI18n() {
    // Update document.title to match
    const titleText = t('title').replace(/<[^>]+>/g, '');
    document.title = titleText + ' · matter.js';

    // Update data-i18n / data-i18n-html / data-i18n-title elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      el.textContent = t(k);
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const k = el.getAttribute('data-i18n-html');
      el.innerHTML = t(k);
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
      const k = el.getAttribute('data-i18n-title');
      el.title = t(k);
    });

    // Audio status depends on muted state + language
    // (may not be ready yet if i18n runs before audio module is declared)
    if (typeof audio !== 'undefined') refreshAudioStatus();
  }

  function refreshAudioStatus() {
    const el = document.getElementById('audio-status');
    if (!el) return;
    el.textContent = t(audio && audio.muted ? 'hud.sound.off' : 'hud.sound.on');
  }

  function setLang(lang) {
    if (lang !== 'ko' && lang !== 'en') return;
    if (lang === currentLang) return;
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (_) {}
    applyI18n();
  }

  function toggleLang() {
    setLang(currentLang === 'ko' ? 'en' : 'ko');
  }

  // NOTE: initial applyI18n() runs at the very end of the IIFE
  // (after all sibling modules like `audio` are declared) so the
  // audio-status text gets localized on first paint.

  // ───────────────────────── Sound (Web Audio API) ─────────────────────────
  // Procedural clank (metal) + thud (wood) — no audio assets needed.
  // Browsers require a user gesture before AudioContext can play; we init lazily.
  const audio = {
    ctx: null,
    enabled: false,   // true once we've successfully resumed
    muted: false,
    init() {
      if (this.ctx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      this.ctx = new Ctx();
    },
    resume() {
      this.init();
      if (this.ctx && this.ctx.state === 'suspended') {
        this.ctx.resume().then(() => { this.enabled = true; }).catch(() => {});
      } else if (this.ctx) {
        this.enabled = true;
      }
    },
    setMuted(m) {
      this.muted = m;
      refreshAudioStatus();
    },
    // Metallic clank: short noise burst through a bandpass filter centered ~2-3 kHz
    clank(intensity) {
      if (this.muted || !this.ctx || !this.enabled) return;
      const ctx = this.ctx;
      const t0 = ctx.currentTime;
      const dur = 0.18;
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        // Decaying noise (sharp attack, fast decay)
        const env = Math.exp(-i / data.length * 8);
        data[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800 + Math.random() * 1200;  // varying metal tone
      bp.Q.value = 6;
      const g = ctx.createGain();
      const vol = Math.min(0.35, 0.05 + intensity * 0.04);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      src.connect(bp); bp.connect(g); g.connect(ctx.destination);
      src.start(t0);
      src.stop(t0 + dur + 0.02);
    },
    // Wood thud: low-frequency sine with quick decay
    thud(intensity) {
      if (this.muted || !this.ctx || !this.enabled) return;
      const ctx = this.ctx;
      const t0 = ctx.currentTime;
      const dur = 0.28;
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(110 + Math.random() * 40, t0);
      osc.frequency.exponentialRampToValueAtTime(55, t0 + dur);
      const g = ctx.createGain();
      const vol = Math.min(0.45, 0.08 + intensity * 0.05);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }
  };

  // Resume audio on the FIRST user gesture anywhere (click / key / touch)
  const armAudio = () => { audio.resume(); window.removeEventListener('pointerdown', armAudio); window.removeEventListener('keydown', armAudio); };
  window.addEventListener('pointerdown', armAudio, { once: false });
  window.addEventListener('keydown', armAudio, { once: false });

  // HUD: clickable sound toggle
  const audioStatusEl = document.getElementById('audio-status');
  if (audioStatusEl) {
    audioStatusEl.style.pointerEvents = 'auto';
    audioStatusEl.style.cursor = 'pointer';
    audioStatusEl.addEventListener('click', (e) => {
      e.stopPropagation();
      audio.resume();
      audio.setMuted(!audio.muted);
    });
  }

  // HUD: clickable L key — toggles language
  const langKeyEl = document.getElementById('lang-key');
  if (langKeyEl) {
    langKeyEl.style.pointerEvents = 'auto';
    langKeyEl.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleLang();
    });
  }

  // ───────────────────────── Dust particle system ─────────────────────────
  // Lightweight custom particles (NOT physics bodies) drawn via afterRender hook.
  // Spawned on impact; updated each frame; auto-removed when life <= 0.
  const particles = [];
  function spawnDust(x, y, count, intensity) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = (0.8 + Math.random() * 1.6) * Math.max(0.4, intensity * 0.4);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (1.2 + Math.random() * 1.5),  // upward bias
        life: 1.0,
        decay: 0.55 + Math.random() * 0.5,                          // 0.55-1.05s
        size: 1.6 + Math.random() * 2.6,
        // tan/wood-dust palette
        r: 165 + Math.floor(Math.random() * 35),
        g: 135 + Math.floor(Math.random() * 30),
        b: 95  + Math.floor(Math.random() * 25)
      });
    }
  }

  // Step particles by `dt` seconds; remove dead ones
  function stepParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x  += p.vx * dt * 60;
      p.y  += p.vy * dt * 60;
      p.vy += 55 * dt;          // gravity (canvas +y is down)
      p.vx *= 0.94;
      p.life -= dt / p.decay;
      if (p.life <= 0 || p.y > window.innerHeight + 20) particles.splice(i, 1);
    }
  }

  function drawParticles(ctx) {
    if (particles.length === 0) return;
    for (const p of particles) {
      const a = Math.max(0, Math.min(1, p.life)) * 0.55;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${a.toFixed(3)})`;
      ctx.fill();
    }
  }

  // Wire dust + sound to collisions
  Events.on(engine, 'collisionStart', (event) => {
    for (const pair of event.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      // Approximate impact magnitude from relative velocity & mass
      const rvx = (a.velocity.x - b.velocity.x);
      const rvy = (a.velocity.y - b.velocity.y);
      const relV = Math.hypot(rvx, rvy);
      if (relV < 0.6) continue;  // skip micro-contacts
      const la = a.label, lb = b.label;
      const isMetalA = (la === 'chain-link' || la === 'wrecking-ball');
      const isMetalB = (lb === 'chain-link' || lb === 'wrecking-ball');
      const isWoodA  = (la === 'wood-box');
      const isWoodB  = (lb === 'wood-box');

      // Sound routing
      if (isMetalA && isWoodB) audio.clank(relV);
      else if (isMetalB && isWoodA) audio.clank(relV);
      else if (isWoodA || isWoodB) audio.thud(relV);

      // Dust at contact point — only on high-velocity wood impacts
      if (relV > 1.5 && (isWoodA || isWoodB)) {
        const cx = (a.position.x + b.position.x) / 2;
        const cy = (a.position.y + b.position.y) / 2;
        const count = Math.min(14, 4 + Math.floor(relV * 2));
        spawnDust(cx, cy, count, relV);
      }
    }
  });

  // Draw dust on top of physics each frame
  let _lastT = performance.now();
  Events.on(render, 'afterRender', () => {
    const now = performance.now();
    const dt = Math.min(0.05, (now - _lastT) / 1000);
    _lastT = now;
    stepParticles(dt);
    drawParticles(render.context);
  });

  // Expose particle count for tests
  window.__particles = () => particles.length;

  // ───────────────────────── World state + controls ─────────────────────────
  let chain = buildChain();
  buildStage();
  buildBoxes();

  function resetWorld() {
    chain = buildChain();
    buildBoxes();
    // Stage is static — no rebuild needed
  }

  function applyImpulse() {
    if (!chain || !chain.end) return;
    const end = chain.end;
    const m = end.mass;
    // Lateral push, slight upward bias (chain then falls and swings)
    Body.applyForce(end, end.position, { x: 0.04 * m, y: -0.005 * m });
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyR' || e.code === 'Keyr') {
      resetWorld();
    } else if (e.code === 'Space') {
      applyImpulse();
      e.preventDefault();
    } else if (e.code === 'KeyL' || e.code === 'Keyl') {
      toggleLang();
      e.preventDefault();
    }
  });

  // Block page scroll on Space when canvas is focused
  render.canvas.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });

  // ───────────────────────── Engine liveness timestamp (for tests) ─────────────────────────
  const tsEl = document.getElementById('ts');
  Events.on(engine, 'afterUpdate', () => {
    if (tsEl) tsEl.textContent = String(engine.timing.timestamp);
  });

  // ───────────────────────── Diagnostics on load (smoke check) ─────────────────────────
  // Re-apply i18n now that audio is defined (audio-status text needs it).
  applyI18n();

  // Quiet — no console.log spam; dev can inspect `window.__sim` if needed.
  window.__sim = {
    engine, render, chain, mouseConstraint, audio,
    bodies: () => Composite.allBodies(engine.world).length,
    constraints: () => Composite.allConstraints(engine.world).length,
    chainEnd: () => chain && chain.end ? chain.end.position : null,
    chainEndLabel: () => chain && chain.end ? chain.end.label : null,
    ball: () => chain && chain.ball ? { x: chain.ball.position.x, y: chain.ball.position.y, label: chain.ball.label } : null,
    boxBodies: () => boxComp.bodies.map(b => ({
      x: +b.position.x.toFixed(2), y: +b.position.y.toFixed(2),
      a: +b.angle.toFixed(3),
      vx: +b.velocity.x.toFixed(2), vy: +b.velocity.y.toFixed(2)
    })),
    chainLinkCount: () => chain ? chain.links.length : 0,
    settleMetric: () => {
      if (!chain) return 0;
      let totalKE = 0;
      for (const link of chain.links) {
        totalKE += 0.5 * link.mass * (link.velocity.x ** 2 + link.velocity.y ** 2);
      }
      return +totalKE.toFixed(4);
    },
    particles: () => particles.length,
    audioStatus: () => ({ enabled: audio.enabled, muted: audio.muted }),
    lang: () => currentLang,
    setLang: (l) => setLang(l),
    i18nText: (k) => t(k)
  };
})();
</script>
</body>
</html>
